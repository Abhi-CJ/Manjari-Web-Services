databases:
  - name: manjari-db
    databaseName: manjari_taxi
    user: manjari
    plan: free

services:
  - type: web
    name: manjari-taxi-web
    env: docker
    plan: free
    dockerCommand: gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: manjari-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "manjari-taxi-web.onrender.com"
      - key: EMAIL_HOST_USER
        sync: false
      - key: EMAIL_HOST_PASSWORD
        sync: false
      - key: CONTACT_PHONE
        value: "+919399623699"
      - key: CONTACT_PHONE_DISPLAY
        value: "+91 9399623699"
      - key: CONTACT_EMAIL
        value: "info@manjaritaxi.com"
      - key: WHATSAPP_LINK
        value: "https://wa.me/919399623699"
